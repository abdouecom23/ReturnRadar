name: ReturnRadar Monorepo App Deploy (Build APK)

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1. سحب كود المشروع
      - name: Checkout Repository
        uses: actions/checkout@v4

      # 2. إعداد بيئة Java JDK 17
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # 3. خطوة الحل الجذري: تثبيت إصدار Gradle 9.3.1 الرسمي على الخادم مباشرة
      - name: Setup Gradle 9.3.1
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '9.3.1'

      # 4. بناء نسخة الـ APK للموديول الرئيسي باستخدام الأمر العام مباشرة (بدون wrapper)
      - name: Build APK with Global Gradle
        run: gradle :app:assembleRelease

      # 5. استخراج الـ APK ورفعه للتحميل
      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ReturnRadar-Monorepo-APK
          path: "**/build/outputs/apk/release/*-release.apk"
          if-no-files-found: error
