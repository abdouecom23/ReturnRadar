name: ReturnRadar Monorepo App Deploy (Build APK)

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1. سحب كود المشروع
      - name: Checkout Repository
        uses: actions/checkout@v4

      # 2. إعداد بيئة Java JDK 17
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      # 3. خطوة الحسم: تحميل الجرادل الرسمي 9.3.1 مباشرة وتخطي الملف التالف تماماً
      - name: Download Official and Clean Gradle 9.3.1 Wrapper
        run: |
          mkdir -p gradle/wrapper
          curl -L -o gradle/wrapper/gradle-wrapper.jar https://repo.gradle.org/mapstruct/release/org/gradle/gradle-wrapper/9.3/gradle-wrapper-9.3.jar || \
          curl -L -o gradle/wrapper/gradle-wrapper.jar https://raw.githubusercontent.com/gradle/gradle/v9.3.1/gradle/wrapper/gradle-wrapper.jar
          
          echo "distributionUrl=https\://services.gradle.org/distributions/gradle-9.3.1-bin.zip" > gradle/wrapper/gradle-wrapper.properties

      # 4. إعطاء صلاحيات التشغيل لملف التشغيل الأساسي
      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      # 5. بناء نسخة الـ APK للموديول الرئيسي
      - name: Build APK with Gradle
        run: ./gradlew :app:assembleRelease

      # 6. استخراج الـ APK ورفعه للتحميل
      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ReturnRadar-Monorepo-APK
          path: "**/build/outputs/apk/release/*-release.apk"
          if-no-files-found: error
