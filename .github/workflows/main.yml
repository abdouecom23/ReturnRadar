name: ReturnRadar App Deploy (Build APK)

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1. جلب الكود من الـ Repository
      - name: Checkout Repository
        uses: actions/checkout@v4

      # 2. إعداد بيئة Java JDK 17 المستقرة
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      # 3. إعطاء صلاحيات التشغيل للـ gradlew داخل مجلد android
      - name: Grant execute permission for gradlew
        run: chmod +x android/gradlew

      # 4. الانتقال لمجلد الأندرويد وبناء نسخة الـ APK التجمعية للـ Release
      - name: Build APK
        run: |
          cd android
          ./gradlew assembleRelease

      # 5. استخراج ملف الـ APK ورفعه لتتمكن من تحميله مباشرة
      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ReturnRadar-SaaS-App
          path: android/app/build/outputs/apk/release/app-release.apk
