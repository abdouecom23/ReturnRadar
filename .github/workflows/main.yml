name: Android CI/CD (Build APK)

on:
  push:
    branches: [ "main", "master" ] # سيعمل الأكشن عند الـ Push على هذه الفروع
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1. جلب الكود من المستودع
      - name: Checkout Repository
        uses: actions/checkout@v4

      # 2. إعداد بيئة جافا (Java JDK)
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      # 3. إعطاء صلاحيات التشغيل لملف Gradle Wrapper
      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      # 4. بناء نسخة الـ APK (نسخة الـ Release)
      - name: Build APK
        run: ./gradlew assembleRelease

      # 5. رفع ملف الـ APK الناتج ليكون متاحاً للتحميل مباشرة من الـ Workflow
      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: production-apk
          path: app/build/outputs/apk/release/app-release.apk
          
