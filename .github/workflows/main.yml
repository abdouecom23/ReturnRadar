name: ReturnRadar Industrial App Deploy (Build APK)

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1. سحب كود المشروع بالكامل
      - name: Checkout Repository
        uses: actions/checkout@v4

      # 2. إعداد بيئة Java JDK 17 متوافقة مع إصدارات Node الحديثة في عداء جيت هاب
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      # 3. البحث الديناميكي عن ملف gradlew وإعطائه صلاحيات التشغيل أينما كان
      - name: Grant execute permission for gradlew
        run: |
          GRADLE_FILE=$(find . -name "gradlew" -print -quit)
          if [ -z "$GRADLE_FILE" ]; then
            echo "🚨 Error: gradlew wrapper file is missing from this repository!"
            echo "Please run 'git add -f android/gradlew' on your local machine and push."
            exit 1
          fi
          chmod +x "$GRADLE_FILE"
          echo "Found gradlew at: $GRADLE_FILE"

      # 4. الانتقال إلى المجلد الحاضن للـ Gradle وبناء نسخة الـ APK المستقرة (Release)
      - name: Build APK with Gradle
        run: |
          GRADLE_PATH=$(find . -name "gradlew" -print -quit)
          cd $(dirname "$GRADLE_PATH")
          ./gradlew assembleRelease

      # 5. البحث عن ملف الـ APK الناتج أوتوماتيكياً ورفعه للتحميل المباشر
      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ReturnRadar-SaaS-Release-APK
          path: "**/build/outputs/apk/release/*-release.apk"
          if-no-files-found: error
